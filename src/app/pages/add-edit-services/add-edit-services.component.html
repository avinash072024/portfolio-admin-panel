<div class="container py-5 mt-5">
    <div class="card shadow-lg mt-5 border-1 border-primary rounded-4 overflow-hidden" data-aos="fade-up">
        <div class="card-header d-flex justify-content-between align-items-center bg-primary py-3">
            <h4 class="text-white mb-0">
                <i class="bi bi-briefcase me-2"></i>
                {{ isEdit ? 'Edit Service' : 'Create New Service' }}
            </h4>
            <a [routerLink]="['/services']" [queryParams]="{ page: page }" class="btn btn-primary fw-bold"><i class="bi bi-arrow-left"></i> Back</a>
        </div>

        <div class="card-body p-4 p-md-5">
            <form [formGroup]="serviceForm" (ngSubmit)="onSubmit()">
                <div class="row g-4">

                    <!-- Title -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Service Title</label>
                        <input type="text" formControlName="title" class="form-control"
                            [class.is-invalid]="isInvalid('title')" placeholder="e.g. Web Development">
                        <div class="invalid-feedback">Title is required (min 3 chars).</div>
                    </div>

                    <!-- Icon -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Icon Class (Bootstrap Icons)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i [class]="serviceForm.get('icon')?.value || 'bi-question-circle'"></i></span>
                            <input type="text" formControlName="icon" class="form-control"
                                [class.is-invalid]="isInvalid('icon')" placeholder="e.g. bi-code-slash">
                        </div>
                        <div class="invalid-feedback">Icon class is required.</div>
                    </div>

                    <!-- Description -->
                    <div class="col-12">
                        <label class="form-label fw-bold">Description</label>
                        <textarea formControlName="description" class="form-control" rows="3"
                            [class.is-invalid]="isInvalid('description')" placeholder="Briefly describe your service..."></textarea>
                        <div class="invalid-feedback">Description is required (min 10 chars).</div>
                    </div>

                    <!-- Features -->
                    <div class="col-12" formArrayName="features">
                        <div class="form-label fw-bold d-flex justify-content-between align-items-center">
                            <label><i class="bi bi-check2-circle me-1"></i> Key Features</label>
                            <button type="button" (click)="addFeature()"
                                class="btn btn-sm btn-outline-primary border-0">
                                <i class="bi bi-plus-circle"></i> Add Feature
                            </button>
                        </div>
                        
                        <div class="row g-2">
                            <div *ngFor="let f of featuresArray.controls; let i=index" class="col-md-4">
                                <div class="input-group">
                                    <input [formControlName]="i" class="form-control" placeholder="e.g. Responsive Design"
                                        [class.is-invalid]="isInvalid(['features', i])">
                                    <button *ngIf="featuresArray.length > 1" type="button" (click)="removeFeature(i)"
                                        class="btn btn-outline-danger px-2">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div *ngIf="isInvalid('features')" class="text-danger small mt-1">Please provide at least one feature.</div>
                    </div>

                </div>

                <!-- Footer Buttons -->
                <div class="mt-5 d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow">
                        {{ isEdit ? 'Update' : 'Save' }}
                    </button>
                    <a [routerLink]="['/services']" [queryParams]="{ page: page }" class="btn btn-light px-5 py-2 fw-bold border">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
