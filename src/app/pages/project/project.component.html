<div class="container py-5 mt-5" data-aos="fade-up">
    <div class="card border-1 border-primary shadow rounded-4 mt-5 overflow-hidden">
        <div class="card-header bg-transparent border-1 border-primary py-3 d-flex justify-content-between align-items-center">
            <div>
                <h5 class="fw-bold mb-0">Project Portfolio</h5>
                <p class="text-muted small mb-0">Manage and oversee your developed projects</p>
            </div>
            <button class="btn btn-primary btn-sm rounded-3 px-3">
                <i class="bi bi-plus-lg me-1"></i> New Project
            </button>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light-subtle">
                        <tr>
                            <th class="ps-4 py-3 text-uppercase small fw-bold text-muted">Project</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Category</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Stack</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Date</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let project of projects">
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <div class="project-img-wrapper me-3">
                                        <img [src]="project.image || 'assets/placeholder.png'"
                                            class="rounded-3 shadow-sm" alt="title">
                                    </div>
                                    <div>
                                        <div class="fw-bold text-body">{{ project.title }}</div>
                                        <div class="text-muted smaller text-truncate" style="max-width: 200px;">
                                            {{ project.desc[0] }}
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge rounded-pill bg-info-subtle text-info px-3">
                                    {{ project.category }}
                                </span>
                            </td>
                            <td>
                                <div class="d-flex flex-wrap gap-1">
                                    <span *ngFor="let tool of project.tools"
                                        class="badge bg-secondary-subtle text-secondary border border-secondary-subtle fw-normal">
                                        {{ tool }}
                                    </span>
                                </div>
                            </td>
                            <td class="text-muted small">
                                {{ project.date | date:'MMM yyyy' }}
                            </td>
                            <td class="text-end pe-4">
                                <div class="d-flex justify-content-end gap-2">
                                    <button (click)="onEdit(project)" class="btn btn-action-edit" title="Edit">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>
                                    <button (click)="onDelete(project._id)" class="btn btn-action-delete"
                                        title="Delete">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                    <a [href]="project.link" target="_blank" class="btn btn-action-view"
                                        *ngIf="project.link">
                                        <i class="bi bi-box-arrow-up-right"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
