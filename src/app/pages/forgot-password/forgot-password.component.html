<div class="login-container d-flex align-items-center justify-content-center">
	<app-theme-toggler class="theme-toggler"></app-theme-toggler>
	<div class="glass-card p-4 p-md-5 m-4 m-md-0" data-aos="zoom-in" data-aos-duration="1000">

		<div class="text-center mb-4">
			<div class="brand-logo mb-3">
				<i class="bi bi-key-fill text-primary display-4"></i>
			</div>
			<h2 class="fw-bold">Forgot Password</h2>
			<p class="text-muted">Enter your email address and we'll send a link to reset your password.</p>
		</div>

		<form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
			<div class="mb-3">
				<label class="form-label fw-semibold">Email Address</label>
				<div class="input-group has-validation">
					<span class="input-group-text bg-transparent border-end-0">
						<i class="bi bi-envelope text-primary"></i>
					</span>
					<input type="email" formControlName="email" class="form-control border-start-0"
						[class.is-invalid]="isInvalid('email')" placeholder="name@example.com" autocomplete="off">
					<div class="invalid-feedback">Please enter a valid email address.</div>
				</div>
			</div>

			<div class="d-flex justify-content-between align-items-center mb-4">
				<a routerLink="/login" class="text-primary small text-decoration-none fw-bold">Back to Sign In</a>
			</div>

			<button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
				Send Reset Link <i class="bi bi-arrow-right ms-2"></i>
			</button>
		</form>

	</div>
</div>
