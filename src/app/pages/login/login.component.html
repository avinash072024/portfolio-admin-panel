<div class="login-container d-flex align-items-center justify-content-center">
    <app-theme-toggler class="theme-toggler"></app-theme-toggler>
    <div class="glass-card p-4 p-md-5 m-4 m-md-0">

        <div class="text-center mb-4">
            <div class="brand-logo mb-3">
                <i class="bi bi-shield-lock-fill text-primary display-4"></i>
            </div>
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Please enter your details to sign in</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <div class="input-group has-validation">
                    <span class="input-group-text bg-transparent border-end-0">
                        <i class="bi bi-envelope text-primary"></i>
                    </span>
                    <input type="email" formControlName="email" class="form-control border-start-0"
                        [class.is-invalid]="isInvalid('email')" placeholder="name@example.com" autocomplete="off">
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0">
                        <i class="bi bi-lock text-primary"></i>
                    </span>
                    <input [type]="passwordVisible ? 'text' : 'password'" formControlName="password"
                        class="form-control border-start-0 border-end-0" [class.is-invalid]="isInvalid('password')"
                        placeholder="••••••••" autocomplete="off">
                    <span class="input-group-text bg-transparent border-start-0 rounded-end-2 cursor-pointer"
                        (click)="passwordVisible = !passwordVisible">
                        <i class="bi" [ngClass]="passwordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
                    </span>
                    <div class="invalid-feedback">Password must be at least 6 characters.</div>
                </div>
            </div>

            <div class="d-flex justify-content-end align-items-center mb-4">
                <!-- <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember" formControlName="rememberMe">
                    <label class="form-check-label small" for="remember">Remember me</label>
                </div> -->
                <a routerLink="/forgot-password" class="text-primary small text-decoration-none fw-bold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                Sign In <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <!-- <div class="text-center mt-4">
            <p class="small text-muted">Don't have an account? <a href="#"
                    class="text-primary fw-bold text-decoration-none">Request Access</a></p>
        </div> -->
    </div>
</div>
