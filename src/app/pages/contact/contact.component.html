<div class="contact-container container pt-4 mt-5">
  <div class="page-header my-5 d-flex justify-content-between align-items-center">
    <div>
      <h2 class="fw-bold mb-1">Contact Management</h2>
      <p class="text-secondary mb-0">Update your contact details and social links shown on your portfolio.</p>
    </div>
    <div *ngIf="message()"
      [ngClass]="{'alert-success': message()?.type === 'success', 'alert-danger': message()?.type === 'error'}"
      class="alert py-2 px-3 mb-0 fade show" role="alert">
      {{ message()?.text }}
    </div>
  </div>

  <div *ngIf="isLoading(); else formTpl" class="loading-state d-flex justify-content-center align-items-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <ng-template #formTpl>
    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="row g-4">
      <!-- Basic Info Card -->
      <div class="col-lg-6">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-header bg-transparent py-3">
            <h5 class="mb-0"><i class="bi bi-person-lines-fill me-2 text-primary"></i>Basic Information</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
              <input type="text" id="name" formControlName="name" class="form-control"
                placeholder="Enter your full name">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
              <input type="email" id="email" formControlName="email" class="form-control"
                placeholder="yourname@example.com">
            </div>
            <div class="mb-3">
              <label for="phone" class="form-label">Phone Number</label>
              <input type="text" id="phone" formControlName="phone" class="form-control" placeholder="+91 1234567890">
            </div>
            <div class="mb-0">
              <label for="address" class="form-label">Address / Location</label>
              <textarea id="address" formControlName="address" class="form-control" rows="3"
                placeholder="City, Country"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Social Links Card -->
      <div class="col-lg-6">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-header bg-transparent py-3">
            <h5 class="mb-0"><i class="bi bi-share-fill me-2 text-primary"></i>Social Media Links</h5>
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="linkedin" class="form-label"><i class="bi bi-linkedin me-1"></i> LinkedIn</label>
                <input type="text" id="linkedin" formControlName="linkedin" class="form-control"
                  placeholder="LinkedIn URL">
              </div>
              <div class="col-md-6">
                <label for="github" class="form-label"><i class="bi bi-github me-1"></i> GitHub</label>
                <input type="text" id="github" formControlName="github" class="form-control" placeholder="GitHub URL">
              </div>
              <div class="col-md-6">
                <label for="twitter" class="form-label"><i class="bi bi-twitter-x me-1"></i> Twitter / X</label>
                <input type="text" id="twitter" formControlName="twitter" class="form-control" placeholder="Twitter URL">
              </div>
              <div class="col-md-6">
                <label for="instagram" class="form-label"><i class="bi bi-instagram me-1"></i> Instagram</label>
                <input type="text" id="instagram" formControlName="instagram" class="form-control"
                  placeholder="Instagram URL">
              </div>
              <div class="col-md-6">
                <label for="facebook" class="form-label"><i class="bi bi-facebook me-1"></i> Facebook</label>
                <input type="text" id="facebook" formControlName="facebook" class="form-control"
                  placeholder="Facebook URL">
              </div>
              <div class="col-md-6">
                <label for="whatsapp" class="form-label"><i class="bi bi-whatsapp me-1"></i> WhatsApp</label>
                <input type="text" id="whatsapp" formControlName="whatsapp" class="form-control"
                  placeholder="WhatsApp Number">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Additional Links & Action -->
      <div class="col-12 d-none">
        <div class="card shadow-sm border-0">
          <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <div class="flex-grow-1 w-100">
              <label for="resumeUrl" class="form-label fw-bold"><i
                  class="bi bi-file-earmark-pdf-fill me-2 text-primary"></i>Resume / Portfolio PDF Link</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                <input type="text" id="resumeUrl" formControlName="resumeUrl" class="form-control"
                  placeholder="G-Drive or Direct PDF Link">
              </div>
            </div>
            <div class="d-flex gap-2 mt-md-4">
              <button type="button" (click)="loadContact()" class="btn btn-outline-secondary px-4">Reset</button>
              <button type="submit" [disabled]="contactForm.invalid || isSaving()"
                class="btn btn-primary px-5 d-flex align-items-center">
                <span *ngIf="isSaving()" class="spinner-border spinner-border-sm me-2" role="status"
                  aria-hidden="true"></span>
                {{ isSaving() ? 'Saving...' : 'Save Changes' }}
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 mb-5">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <div class="row">
              <div class="col-md-9">
                <label for="resumeUrl" class="form-label fw-bold"><i
                    class="bi bi-file-earmark-pdf-fill me-2 text-primary"></i>Resume / Portfolio PDF Link</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                  <input type="text" id="resumeUrl" formControlName="resumeUrl" class="form-control"
                    placeholder="G-Drive or Direct PDF Link">
                </div>
              </div>
              <div class="col-md-3 d-flex align-items-end gap-2">
                <button type="button" (click)="loadContact()" class="btn btn-outline-secondary btn-lg px-4">Reset</button>
                <button type="submit" [disabled]="contactForm.invalid || isSaving()"
                  class="btn btn-primary btn-lg px-5 d-flex align-items-center">
                  <span *ngIf="isSaving()" class="spinner-border spinner-border-sm me-2" role="status"
                    aria-hidden="true"></span>
                  {{ isSaving() ? 'Saving...' : 'Save' }}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </ng-template>
</div>
